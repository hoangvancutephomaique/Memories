spring.application.name=guestbook-backend

# Local dev: H2 file DB (ephemeral on cloud unless you attach a disk).
spring.datasource.url=jdbc:h2:file:./data/guestbook
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# REST API only; avoids lazy-loading during "view" phase and silences the startup warning.
spring.jpa.open-in-view=false

# H2 console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080

# Large JSON bodies (e.g. guestbook message up to 500k UTF-8 chars); default ~2MB is too small for worst-case UTF-8.
server.tomcat.max-http-form-post-size=10MB

# CORS – comma-separated list of allowed origins
# Override in production via CORS_ALLOWED_ORIGINS environment variable
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# If set, DELETE /api/entries/{id} requires header X-Delete-Secret with this value (set on Render only).
guestbook.delete-secret=${GUESTBOOK_DELETE_SECRET:}

# Google Sign-In: OAuth 2.0 Web Client ID(s) from Google Cloud Console (comma-separated if several).
# Must match the client id used by the frontend (VITE_GOOGLE_CLIENT_ID).
guestbook.google.client-ids=${GOOGLE_CLIENT_IDS:}
