# Render Blueprint: https://render.com/docs/blueprint-spec
# After first deploy, set CORS_ALLOWED_ORIGINS in the dashboard to your GitHub Pages origin, e.g.:
#   https://YOUR_USER.github.io
# (no /repo path — browsers send Origin as scheme + host only.)

services:
  - type: web
    name: guestbook-api
    runtime: docker
    plan: free
    region: oregon # optional: oregon | frankfurt | singapore | ohio | virginia
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/entries
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: postgres
      - key: SPRING_DATASOURCE_URL
        sync: false # e.g. jdbc:postgresql://ep-xxx.region.aws.neon.tech/neondb?sslmode=require
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false # set manually to your Pages Origin(s), comma-separated if multiple
