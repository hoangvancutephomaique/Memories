services:
  - type: web
    name: guestbook-api
    runtime: java
    buildCommand: cd backend && ./mvnw package -DskipTests
    # Render sets PORT; Spring Boot defaults to 8080 without this.
    startCommand: java -jar backend/target/guestbook-backend-0.0.1-SNAPSHOT.jar --server.port=$PORT
    envVars:
      - key: CORS_ALLOWED_ORIGINS
        sync: false   # set manually in Render dashboard (your GitHub Pages URL)
